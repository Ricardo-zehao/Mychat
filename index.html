<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>多人在线聊天</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f3f4f6;font-family:Arial}
.main{max-width:900px;margin:20px auto}
.card{background:white;border-radius:10px;padding:16px;box-shadow:0 1px 3px #0000001f}
input{width:100%;padding:10px;margin:6px 0;border:1px solid #ddd;border-radius:6px}
button{padding:10px 16px;background:#007bff;color:white;border:none;border-radius:6px;cursor:pointer}
.gray{background:#6c757d}
.msg{padding:8px 12px;background:#f1f1f1;border-radius:6px;margin:6px 0}
</style>
</head>
<body>
<div class="main">

  <div id="login" class="card">
    <h3>登录</h3>
    <input id="login_user" placeholder="用户名">
    <input id="login_pwd" type="password" placeholder="密码">
    <button onclick="login()">登录</button>
    <button class="gray" onclick="goReg()">去注册</button>
  </div>

  <div id="reg" class="card" style="display:none">
    <h3>注册</h3>
    <input id="reg_user" placeholder="用户名">
    <input id="reg_pwd" type="password" placeholder="密码">
    <button onclick="reg()">注册</button>
    <button class="gray" onclick="goLogin()">返回登录</button>
  </div>

  <div id="chat" class="card" style="display:none;margin-top:20px">
    <div id="msgList" style="height:350px;overflow-y:auto;margin-bottom:12px"></div>
    <div style="display:flex;gap:8px">
      <input id="msg" placeholder="输入消息..." style="flex:1">
      <button onclick="send()">发送</button>
    </div>
  </div>

</div>

<script>
// 全局
let nowUser = null

// 切换面板
function goReg(){
  document.getElementById('login').style.display='none'
  document.getElementById('reg').style.display='block'
}
function goLogin(){
  document.getElementById('reg').style.display='none'
  document.getElementById('login').style.display='block'
}

// 注册
function reg(){
  let u = document.getElementById('reg_user').value
  let p = document.getElementById('reg_pwd').value
  if(!u||!p)return alert('请填写完整')
  localStorage.setItem('user_'+u, p)
  alert('注册成功！请登录')
  goLogin()
}

// 登录
function login(){
  let u = document.getElementById('login_user').value
  let p = document.getElementById('login_pwd').value
  if(localStorage.getItem('user_'+u)===p){
    nowUser = u
    document.getElementById('login').style.display='none'
    document.getElementById('reg').style.display='none'
    document.getElementById('chat').style.display='block'
    loadMsg()
    setInterval(loadMsg, 1000)
  }else{
    alert('账号或密码错误')
  }
}

// 发送消息
function send(){
  let txt = document.getElementById('msg').value.trim()
  if(!txt||!nowUser)return
  let msgs = JSON.parse(localStorage.getItem('chats')||'[]')
  msgs.push({
    user: nowUser,
    text: txt,
    time: new Date().toLocaleString()
  })
  localStorage.setItem('chats', JSON.stringify(msgs))
  document.getElementById('msg').value=''
  loadMsg()
}

// 加载消息
function loadMsg(){
  let list = document.getElementById('msgList')
  let msgs = JSON.parse(localStorage.getItem('chats')||'[]')
  list.innerHTML = msgs.map(m=>`
    <div class="msg">
      <div style="font-size:12px;color:#666">${m.user} · ${m.time}</div>
      <div>${m.text}</div>
    </div>
  `).join('')
  list.scrollTop = list.scrollHeight
}
</script>
</body>
</html>
