<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>纯本地可发消息聊天室</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f3f4f6; font-family: Arial; }
        .container { max-width: 900px; margin: 20px auto; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-blue { background: #007bff; color: white; }
        .btn-gray { background: #6c757d; color: white; margin-left: 8px; }
        .msg { padding: 10px; background: #f1f1f1; border-radius: 6px; margin: 8px 0; }
        .msg-admin { background: #dbeafe; }
        .msg-info { font-size: 12px; color: #666; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 聊天面板（你已经能登录到这里） -->
        <div id="chatPanel" class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <span>欢迎你，<b id="currentUser">3961659749@qq.com</b></span>
                <button onclick="logout()" class="btn-gray">退出登录</button>
            </div>
            <div id="msgList" style="height: 350px; overflow-y: auto; margin-bottom: 16px;"></div>
            <div style="display: flex; gap: 8px;">
                <input id="msgInput" placeholder="输入消息..." style="flex: 1;">
                <button onclick="sendMessage()" class="btn-blue">发送</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = "3961659749@qq.com";
        let messages = []; // 纯本地存消息，绕过网络问题

        // 加载消息（纯本地）
        function loadMessages() {
            const list = document.getElementById('msgList');
            list.innerHTML = messages.map(msg => `
                <div class="msg ${msg.user === currentUser ? 'msg-admin' : ''}">
                    <div class="msg-info">${msg.user} · ${new Date(msg.time).toLocaleString()}</div>
                    <div>${msg.content}</div>
                </div>
            `).join('');
            list.scrollTop = list.scrollHeight;
        }

        // 发送消息（纯本地，不会再弹出发送失败）
        function sendMessage() {
            const content = document.getElementById('msgInput').value.trim();
            if (!content) return;
            messages.push({
                user: currentUser,
                content: content,
                time: new Date()
            });
            document.getElementById('msgInput').value = '';
            loadMessages();
        }

        function logout() {
            location.reload();
        }

        // 页面加载时显示欢迎消息
        loadMessages();
    </script>
</body>
</html>
