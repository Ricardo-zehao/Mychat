<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>公共聊天室</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #f3f4f6; font-family: Arial; }
        .container { max-width: 900px; margin: 20px auto; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 16px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-blue { background: #007bff; color: white; }
        .btn-gray { background: #6c757d; color: white; margin-left: 8px; }
        .msg { padding: 10px; background: #f1f1f1; border-radius: 6px; margin: 8px 0; }
        .msg-info { font-size: 12px; color: #666; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 登录/注册面板 -->
        <div id="authPanel" class="card">
            <h2 style="margin-bottom: 16px;">账号登录</h2>
            <div style="display: flex; gap: 16px; margin-bottom: 16px;">
                <button onclick="showPanel('login')" class="btn-blue" id="tabLogin">登录</button>
                <button onclick="showPanel('register')" class="btn-gray" id="tabRegister">注册</button>
            </div>

            <div id="loginForm">
                <input type="text" id="loginUser" placeholder="用户名">
                <input type="password" id="loginPwd" placeholder="密码" style="margin-bottom: 16px;">
                <button onclick="login()" class="btn-blue" style="width: 100%;">登录</button>
            </div>

            <div id="registerForm" style="display: none;">
                <input type="text" id="regUser" placeholder="用户名">
                <input type="password" id="regPwd" placeholder="密码（至少6位）" style="margin-bottom: 16px;">
                <button onclick="register()" class="btn-blue" style="width: 100%;">注册</button>
            </div>
        </div>

        <!-- 聊天面板 -->
        <div id="chatPanel" class="card" style="display: none; margin-top: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <span id="userInfo"></span>
                <button onclick="logout()" class="btn-gray">退出登录</button>
            </div>
            <div id="msgList" style="height: 350px; overflow-y: auto; margin-bottom: 16px;"></div>
            <div style="display: flex; gap: 8px;">
                <input id="msgInput" placeholder="输入消息..." style="flex: 1;">
                <button onclick="sendMessage()" class="btn-blue">发送</button>
            </div>
        </div>
    </div>

    <!-- 加载 Supabase SDK（只用来存消息，不用来登录） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 你的 Supabase 配置（只用来存消息）
        const SUPABASE_URL = 'https://ceapbcodobfkdakkcfgv.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_3ZEm9C76K2RzRlsXvm-DKw_ofuJBVuY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // 切换登录/注册面板
        function showPanel(type) {
            if (type === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
                document.getElementById('tabLogin').classList.replace('btn-gray', 'btn-blue');
                document.getElementById('tabRegister').classList.replace('btn-blue', 'btn-gray');
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
                document.getElementById('tabLogin').classList.replace('btn-blue', 'btn-gray');
                document.getElementById('tabRegister').classList.replace('btn-gray', 'btn-blue');
            }
        }

        // 注册（本地存用户名密码，不涉及 Supabase 认证）
        function register() {
            const user = document.getElementById('regUser').value;
            const pwd = document.getElementById('regPwd').value;
            if (!user || !pwd || pwd.length < 6) return alert('用户名和密码不能为空，密码至少6位');
            if (localStorage.getItem('user_' + user)) return alert('用户名已存在');
            localStorage.setItem('user_' + user, pwd);
            alert('注册成功！请登录');
            showPanel('login');
        }

        // 登录（本地验证，不涉及 Supabase 认证）
        function login() {
            const user = document.getElementById('loginUser').value;
            const pwd = document.getElementById('loginPwd').value;
            if (!user || !pwd) return alert('请填写完整信息');
            if (localStorage.getItem('user_' + user) !== pwd) return alert('用户名或密码错误');
            currentUser = user;
            document.getElementById('authPanel').style.display = 'none';
            document.getElementById('chatPanel').style.display = 'block';
            document.getElementById('userInfo').textContent = `当前用户：${user}`;
            loadMessages();
            // 实时监听新消息
            supabase.channel('public:messages')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, loadMessages)
                .subscribe();
        }

        // 登出
        function logout() {
            currentUser = null;
            location.reload();
        }

        // 加载消息（从 Supabase 读取，所有人共享）
        async function loadMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });
            if (error) return alert(error.message);
            const list = document.getElementById('msgList');
            list.innerHTML = data.map(msg => `
                <div class="msg">
                    <div class="msg-info">${msg.user_email} · ${new Date(msg.created_at).toLocaleString()}</div>
                    <div>${msg.content}</div>
                </div>
            `).join('');
            list.scrollTop = list.scrollHeight;
        }

        // 发送消息（写到 Supabase，所有人可见）
        async function sendMessage() {
            const content = document.getElementById('msgInput').value.trim();
            if (!content || !currentUser) return;
            const { error } = await supabase.from('messages').insert([{
                user_email: currentUser, // 用用户名代替邮箱
                content: content
            }]);
            if (error) alert(error.message);
            else document.getElementById('msgInput').value = '';
        }
    </script>
</body>
</html>
