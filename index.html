<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>简易聊天</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#f0f0f0}
.box{border:1px solid #ccc;border-radius:8px;padding:10px;background:white}
button{cursor:pointer}
</style>
</head>
<body>
<div style="max-width:800px;margin:20px auto">
  <div id="loginBox" class="box">
    <h3>登录</h3>
    <input id="email" placeholder="邮箱" style="width:100%;padding:8px;margin:5px 0"><br>
    <input id="pwd" placeholder="密码" type="password" style="width:100%;padding:8px;margin:5px 0"><br>
    <button onclick="doLogin()" style="padding:8px 16px">登录</button>
    <button onclick="showReg()" style="padding:8px 16px">去注册</button>
  </div>

  <div id="regBox" class="box" style="display:none">
    <h3>注册</h3>
    <input id="regEmail" placeholder="邮箱" style="width:100%;padding:8px;margin:5px 0"><br>
    <input id="regPwd" placeholder="密码" type="password" style="width:100%;padding:8px;margin:5px 0"><br>
    <button onclick="doReg()" style="padding:8px 16px">注册</button>
    <button onclick="showLogin()" style="padding:8px 16px">返回登录</button>
  </div>

  <div id="chatBox" class="box" style="display:none;margin-top:20px">
    <div id="msgList" style="height:300px;overflow-y:auto;border:1px solid #ddd;padding:10px;margin-bottom:10px"></div>
    <input id="msgInput" placeholder="输入消息..." style="width:70%;padding:8px">
    <button onclick="sendMsg()" style="padding:8px 16px">发送</button>
  </div>
</div>

<script>
// 本地模拟登录注册（无外部CDN，国内100%能用）
let user = null;

function showReg() {
  document.getElementById('loginBox').style.display='none';
  document.getElementById('regBox').style.display='block';
}
function showLogin() {
  document.getElementById('regBox').style.display='none';
  document.getElementById('loginBox').style.display='block';
}

function doReg() {
  const e = document.getElementById('regEmail').value;
  const p = document.getElementById('regPwd').value;
  if(!e||!p)return alert('填完整');
  localStorage.setItem('user_'+e,p);
  alert('注册成功！请登录');
  showLogin();
}

function doLogin() {
  const e = document.getElementById('email').value;
  const p = document.getElementById('pwd').value;
  if(localStorage.getItem('user_'+e)===p){
    user=e;
    document.getElementById('loginBox').style.display='none';
    document.getElementById('regBox').style.display='none';
    document.getElementById('chatBox').style.display='block';
  }else{
    alert('账号或密码错误');
  }
}

function sendMsg() {
  const txt = document.getElementById('msgInput').value;
  if(!txt||!user)return;
  const d = document.getElementById('msgList');
  d.innerHTML += '<p>'+user+'：'+txt+'</p>';
  d.scrollTop = d.scrollHeight;
  document.getElementById('msgInput').value='';
}
</script>
</body>
</html>
