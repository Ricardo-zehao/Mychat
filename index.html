<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>无敌公共聊天室</title>
    <style>
        *{box-sizing:border-box}body{margin:0;background:#f5f5f5;font-family:Arial}.box{max-width:800px;margin:20px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 0 10px #0002}.inp{width:100%;padding:10px;margin:8px 0;border:1px solid #ddd;border-radius:8px}.btn{padding:10px 20px;border:none;border-radius:8px;background:#007bff;color:white;cursor:pointer}.btn-gray{background:#6c757d}.msg{padding:10px;background:#f1f1f1;border-radius:8px;margin:8px 0}.msg-self{background:#cfe9ff}.info{font-size:12px;color:#888;margin-bottom:4px}
    </style>
</head>
<body>

<div class="box" id="loginBox">
    <h2>公共聊天室</h2>
    <input id="loginUser" class="inp" placeholder="用户名">
    <input id="loginPwd" class="inp" type="password" placeholder="密码">
    <button onclick="doLogin()" class="btn">登录</button>
    <button onclick="showReg()" class="btn btn-gray">去注册</button>
</div>

<div class="box" id="regBox" style="display:none">
    <h2>注册</h2>
    <input id="regUser" class="inp" placeholder="用户名">
    <input id="regPwd" class="inp" type="password" placeholder="密码至少6位">
    <button onclick="doReg()" class="btn">注册</button>
    <button onclick="showLogin()" class="btn btn-gray">返回登录</button>
</div>

<div class="box" id="chatBox" style="display:none">
    <div style="margin-bottom:10px">
        欢迎你，<span id="nowUser" style="font-weight:bold"></span> | <button onclick="logout()" class="btn btn-gray">退出</button>
    </div>
    <div id="msgList" style="height:300px;overflow-y:auto;border:1px solid #ddd;padding:10px;border-radius:8px;margin-bottom:10px"></div>
    <input id="msgTxt" class="inp" placeholder="输入消息...">
    <button onclick="sendMsg()" class="btn">发送</button>
</div>

<!-- 只保留 Supabase 作为存数据的工具 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 你的 Supabase 配置（只用它存消息，不用它登录）
    const SUPABASE_URL = 'https://ceapbcodobfkdakkcfgv.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_3ZEm9C76K2RzRlsXvm-DKw_ofuJBVuY';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let user = null;

    // ---- 界面切换 ----
    function showReg(){ document.getElementById('loginBox').style.display='none'; document.getElementById('regBox').style.display='block'; }
    function showLogin(){ document.getElementById('regBox').style.display='none'; document.getElementById('loginBox').style.display='block'; }

    // ---- 本地注册登录（完全绕过邮箱验证） ----
    function doReg(){
        let u = document.getElementById('regUser').value;
        let p = document.getElementById('regPwd').value;
        if(!u||!p||p.length<6)return alert('请填完整');
        if(localStorage.getItem('u_'+u))return alert('用户名已存在');
        localStorage.setItem('u_'+u, p);
        alert('注册成功！请登录');
        showLogin();
    }
    function doLogin(){
        let u = document.getElementById('loginUser').value;
        let p = document.getElementById('loginPwd').value;
        if(localStorage.getItem('u_'+u)===p){
            user = u;
            document.getElementById('loginBox').style.display='none';
            document.getElementById('chatBox').style.display='block';
            document.getElementById('nowUser').innerText = u;
            loadMsg();
            // 实时监听
            supabase.channel('public:msgs').on('postgres_changes', {event:'INSERT', schema:'public', table:'messages'}, loadMsg).subscribe();
        }else{
            alert('账号或密码错误');
        }
    }

    // ---- 消息逻辑 ----
    async function loadMsg(){
        let {data} = await supabase.from('messages').select('*').order('created_at', {asc:true});
        let list = document.getElementById('msgList');
        list.innerHTML = data.map(m=>`
            <div class="msg ${m.user_email===user?'msg-self':''}">
                <div class="info">${m.user_email} · ${new Date(m.created_at).toLocaleString()}</div>
                <div>${m.content}</div>
            </div>
        `).join('');
        list.scrollTop = list.scrollHeight;
    }
    async function sendMsg(){
        let txt = document.getElementById('msgTxt').value.trim();
        if(!txt||!user)return;
        await supabase.from('messages').insert([{user_email: user, content: txt}]);
        document.getElementById('msgTxt').value = '';
    }
    function logout(){ user=null; location.reload(); }

    // 自动登录（如果本地有存）
    window.onload = function(){
        for(let k in localStorage){
            if(k.startsWith('u_')){
                document.getElementById('loginUser').value = k.substring(2);
                break;
            }
        }
    }
</script>
</body>
</html>
